version: 5.0-final-integrated
supersedes:
- v2 扩展实施文档
- v3 扩展补丁文档
- v4.1 概率犯罪监狱工作与服务业扩展补丁文档
read_this_first_zh: 这是唯一应交给编程 AI 的最终整合配置。旧版补丁只作为历史记录，不再单独读取。
hard_rules_zh:
- LLM 只能选择工具、目标、说话内容和动机；不得直接修改数值、物品、位置、死亡、怀孕、法律结果或关系数值。
- 所有数值变化由后端 EffectEngine / RuleEngine 硬编码决定。
- 工具候选必须先过滤模式、年龄、地点、姓名知识、背包、货币、关系门槛、同意门槛和技能学习状态。
- 不知道姓名时，只能通过外貌/可见对象引用；requires_known_name=true 的工具必须隐藏或硬拒绝。
- 成年亲密、生育和育儿由工具集开关与后端规则控制。
- 犯罪作为社会实验变量被允许，但必须抽象化、记录化、后果化，不提供现实犯罪技巧。
