services:
  tinyworld:
    build:
      context: ../..
      dockerfile: docker/nas/Dockerfile
      args:
        # These mirror-prefixed images avoid some NAS systems rewriting Docker Hub
        # pulls to private/unauthorized mirrors. If one fails, try:
        # docker.m.daocloud.io/library/node:22-bookworm-slim
        # docker.m.daocloud.io/library/python:3.12-slim
        # docker.1panel.live/library/node:22-bookworm-slim
        # docker.1panel.live/library/python:3.12-slim
        NODE_IMAGE: ${NODE_IMAGE:-docker.1ms.run/library/node:22-bookworm-slim}
        PYTHON_IMAGE: ${PYTHON_IMAGE:-docker.1ms.run/library/python:3.12-slim}
    image: tinyworld-nas:latest
    container_name: tinyworld-nas
    restart: unless-stopped
    ports:
      - "${AIWORLD_PORT:-5174}:8010"
    environment:
      TLW_CONFIG: /app/local_config/config.yaml
      TLW_DATABASE_URL: sqlite:////app/data/world.sqlite3
      TLW_LLM_BASE_URL: ${TLW_LLM_BASE_URL:-}
      TLW_LLM_API_KEY: ${TLW_LLM_API_KEY:-}
      TLW_WORLD_MODEL: ${TLW_WORLD_MODEL:-}
      TLW_PRO_MODEL: ${TLW_PRO_MODEL:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/local_config
      - ../../worldpacks/imported:/app/worldpacks/imported
