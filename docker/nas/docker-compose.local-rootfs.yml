services:
  tinyworld-backend:
    build:
      context: ../..
      dockerfile: docker/nas/Dockerfile.local-rootfs
    image: tinyworld-backend:latest
    container_name: tinyworld-backend
    restart: unless-stopped
    ports:
      - "${AIWORLD_BACKEND_PORT:-8010}:8010"
    environment:
      TLW_CONFIG: /app/local_config/config.yaml
      TLW_DATABASE_URL: sqlite:////app/data/world.sqlite3
      TLW_LLM_BASE_URL: ${TLW_LLM_BASE_URL:-}
      TLW_LLM_API_KEY: ${TLW_LLM_API_KEY:-}
      TLW_WORLD_MODEL: ${TLW_WORLD_MODEL:-}
      TLW_PRO_MODEL: ${TLW_PRO_MODEL:-}
      TLW_CORS_ORIGINS: ${TLW_CORS_ORIGINS:-}
      TLW_CORS_ORIGIN_REGEX: ${TLW_CORS_ORIGIN_REGEX:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./debug_exports:/app/debug_exports
      - ./config:/app/local_config
      - ../../worldpacks/imported:/app/worldpacks/imported
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 30s
